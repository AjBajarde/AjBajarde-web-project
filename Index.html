<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aj Bajarde - Personal Web Page</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg1:#c3d3e9;
      --bg2:#154b9c;
      --card:#fff;
      --text:#111827;
      --muted:#7b806b;
      --border:#2e2c2c;
      --shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      font-family:system-ui,Arial;
    }

    .card{
      display:flex;
      align-items:center;
      gap:20px;
      background:var(--card);
      border-radius:16px;
      padding:24px 32px;
      box-shadow:var(--shadow);
      border:3px solid var(--border);
      max-width:600px;
      width:90%;
    }

    .avatar{
      width:100px;
      height:100px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      color:white;
      font-size:2rem;
      font-weight:700;
    }

    .info{
      text-align:left;
      flex:1;
    }

    .info h1{
      margin:0;
      font-size:1.4rem;
      color:var(--text);
    }

    .info p{
      margin:4px 0;
      color:var(--muted);
    }

    .info .role{
      font-weight:600;
      color:var(--bg2);
    }

    .contact{
      margin-top:8px;
      color:var(--muted);
    }

    .contact i{
      color:var(--bg2);
      margin-right:6px;
    }

    .contact div{
      margin:4px 0;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="avatar">
      AB
    </div>

    <div class="info">
      <h1>Aj Bajarde</h1>
      <p class="role">Student / Aspiring Developer</p>
      <p>Personal Web Page</p>

      <div class="contact">
        <div><i class="fa-solid fa-phone"></i> +63 09052473827</div>
        <div><i class="fa-solid fa-envelope"></i> ajbajarde@email.com</div>
        <div><i class="fa-solid fa-globe"></i> github.com/AjBajarde</div>
        <div><i class="fa-solid fa-location-dot"></i> Tuburan, Maayon, Capiz</div>
      </div>
    </div>
  </div>
</body>
</html>
